events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:5000;
  }

  upstream client {
    server client:80;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /metrics {
      proxy_pass http://api;
    }

    location /socket.io/ {
      proxy_pass http://api;
      # FIX: WebSockets require HTTP/1.1. Without this, the connection drops.
      proxy_http_version 1.1; 
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://client;
      proxy_set_header Host $host;
    }

    location /health {
      proxy_pass http://api;
      proxy_set_header Host $host;
    }
  }
}